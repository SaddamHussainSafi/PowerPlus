/* ── SHARED HOOKS ── */
function useCountUp(target, duration=1200, start=true) {
  const [val,setVal] = useState(0);
  useEffect(()=>{
    if(!start) return;
    let raf,t0;
    const tick=(t)=>{
      if(t0==null) t0=t;
      const p=Math.min(1,(t-t0)/duration);
      const eased=1-Math.pow(1-p,3);
      setVal(target*eased);
      if(p<1) raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[target,duration,start]);
  return val;
}

/* ── SHARED COMPONENTS ── */
function Toggle({ on, onChange, size='md' }) {
  const w=size==='sm'?36:44, h=size==='sm'?20:24, thumb=h-6;
  return (
    <button onClick={()=>onChange?.(!on)} className="toggle-track relative rounded-full"
      style={{ width:w, height:h, background:on?'#FF6500':'#21262d',
               boxShadow:on?'0 0 16px rgba(255,101,0,.45),inset 0 0 0 1px rgba(255,255,255,.06)':'inset 0 0 0 1px rgba(255,255,255,.04)' }}
      aria-pressed={on}>
      <span className="toggle-thumb absolute top-1/2 -translate-y-1/2 rounded-full bg-white"
        style={{ width:thumb, height:thumb, left:on?w-thumb-3:3,
                 boxShadow:on?'0 0 12px rgba(255,255,255,.4),0 2px 4px rgba(0,0,0,.4)':'0 2px 4px rgba(0,0,0,.4)' }}/>
    </button>
  );
}

function Badge({ children, variant='orange' }) {
  const map={
    orange:{bg:'rgba(255,101,0,.15)',color:'#FF6500',border:'rgba(255,101,0,.35)'},
    green :{bg:'rgba(63,185,80,.15)', color:'#3fb950',border:'rgba(63,185,80,.35)'},
    grey  :{bg:'rgba(139,148,158,.12)',color:'#8b949e',border:'rgba(139,148,158,.25)'},
    red   :{bg:'rgba(248,81,73,.15)', color:'#f85149',border:'rgba(248,81,73,.35)'},
    purple:{bg:'rgba(139,92,246,.15)',color:'#8b5cf6',border:'rgba(139,92,246,.35)'},
  };
  const s=map[variant]||map.orange;
  return (
    <span className="inline-flex items-center gap-1.5 text-[11px] font-medium px-2.5 py-0.5 rounded-full label"
      style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`}}>
      {children}
    </span>
  );
}

function Button({ children, variant='primary', icon:Icon, onClick, type='button', className='' }) {
  const ref=useRef(null);
  const handle=(e)=>{
    const el=ref.current;
    if(el){
      const rect=el.getBoundingClientRect();
      const dot=document.createElement('span');
      const sz=Math.max(rect.width,rect.height);
      dot.className='ripple';
      dot.style.width=dot.style.height=sz+'px';
      dot.style.left=(e.clientX-rect.left-sz/2)+'px';
      dot.style.top=(e.clientY-rect.top-sz/2)+'px';
      el.appendChild(dot);
      setTimeout(()=>dot.remove(),650);
    }
    onClick?.(e);
  };
  return (
    <button ref={ref} type={type} onClick={handle}
      className={`btn btn-${variant} inline-flex items-center justify-center gap-2 ${className}`}>
      {Icon && <Icon size={16}/>}{children}
    </button>
  );
}

function Card({ title, subtitle, action, children, className='', delay=0 }) {
  return (
    <section className={`bg-card border border-border rounded-xl shadow-card anim-slide-up ${className}`}
      style={{ animationDelay:`${delay}ms` }}>
      {(title||action)&&(
        <header className="flex items-center justify-between px-5 pt-5 pb-3">
          <div>
            {title&&<h3 className="text-[15px] font-semibold tracking-tight">{title}</h3>}
            {subtitle&&<p className="text-xs text-sub mt-0.5">{subtitle}</p>}
          </div>
          {action}
        </header>
      )}
      <div className="px-5 pb-5">{children}</div>
    </section>
  );
}

function Sparkline({ data, color='#FF6500', w=70, h=28 }) {
  const max=Math.max(...data), min=Math.min(...data), range=max-min||1;
  const stepX=w/(data.length-1);
  const pts=data.map((d,i)=>`${i*stepX},${h-((d-min)/range)*h}`).join(' ');
  const path=`M ${pts.replaceAll(' ',' L ')}`;
  return (
    <svg className="spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <linearGradient id="sg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${path} L ${w},${h} L 0,${h} Z`} fill="url(#sg)" stroke="none"/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

function StatCard({ idx=0, icon:Icon, label, value, suffix='', sub, spark }) {
  const [mounted,setMounted]=useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setMounted(true),80+idx*100); return()=>clearTimeout(t); },[idx]);
  const v=useCountUp(value,1200,mounted);
  const display=Number.isInteger(value)?Math.round(v):v.toFixed(1);
  return (
    <div className="stat-card relative bg-card border border-border rounded-xl p-5 shadow-card anim-slide-up overflow-hidden"
         style={{ animationDelay:`${idx*100}ms` }}>
      <div className="flex items-start justify-between mb-4">
        <div className="w-10 h-10 rounded-full flex items-center justify-center"
             style={{ background:'rgba(255,101,0,.12)', color:'#FF6500', boxShadow:'inset 0 0 0 1px rgba(255,101,0,.3)' }}>
          <Icon size={18}/>
        </div>

function ScoreRing({ value }) {
  const size=140, r=56, cir=2*Math.PI*r;
  const v=useCountUp(value,1500);
  const off=cir-(v/100)*cir;
  return (
    <div className="relative">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={r} stroke="#21262d" strokeWidth="10" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r} stroke="url(#g1)" strokeWidth="10" fill="none"
                strokeLinecap="round" strokeDasharray={cir} strokeDashoffset={off}
                transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition:'stroke-dashoffset .5s' }}/>
        <defs><linearGradient id="g1" x1="0" x2="1"><stop offset="0" stopColor="#3fb950"/><stop offset="1" stopColor="#FF6500"/></linearGradient></defs>
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-3xl font-bold tabular-nums">{Math.round(v)}</div>
        <div className="text-[10px] label text-sub">/ 100</div>
      </div>
    </div>
  );
}

function App() {
  const [route,setRoute]=useState('dashboard');

    <div className="min-h-screen text-white">
      <TopBar onSearchClick={()=>setCollapsed(c=>!c)}/>
      <div className="flex">

              <a className="hover:text-brand ease-out-soft" href="#">Docs</a>
            </div>
          </footer>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
